<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sage — Kyle's Board</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F7F5F0; color: #111; min-height: 100vh; }

.app { padding: 16px 12px; max-width: 1100px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
.header-title { font-size: 18px; font-weight: 500; color: #111; }
.header-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.header-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-left: auto; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid; white-space: nowrap; cursor: default; }
.badge-overdue { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
.badge-soon { background: #FAEEDA; color: #633806; border-color: #FAC775; }
.badge-done { background: transparent; color: #888; border-color: #ccc; cursor: pointer; }
.badge-done.active { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }

/* Board */
.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .board { grid-template-columns: 1fr; } }

/* Column */
.column { border-radius: 12px; padding: 12px; min-height: 120px; border: 0.5px solid #e0e0e0; background: #f8f8f8; transition: background 0.15s, border-color 0.15s; }
.column.drag-over { background: #f0f0f0; }
.col-header { display: flex; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid #eee; }
.col-title { flex: 1; }
.col-title-main { font-size: 13px; font-weight: 500; color: #111; }
.col-title-sub { font-size: 11px; color: #aaa; margin-top: 1px; }
.col-count { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; border: 0.5px solid; }

/* Card */
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 7px 8px; margin-bottom: 4px; cursor: grab; position: relative; transition: opacity 0.15s, box-shadow 0.15s; user-select: none; }
.card:active { cursor: grabbing; }
.card.dragging { opacity: 0.35; }
.card.graveyard { opacity: 0.6; }
.card.drag-target { box-shadow: 0 0 0 2px #85B7EB; }
.card-body { display: flex; align-items: flex-start; gap: 6px; }
.card-check { flex-shrink: 0; margin-top: 2px; width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid #ccc; cursor: pointer; background: transparent; display: flex; align-items: center; justify-content: center; }
.card-check:hover { border-color: #5DCAA5; }
.card-content { flex: 1; min-width: 0; }
.card-text { font-size: 12px; color: #111; line-height: 1.4; }
.card-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.card-area { font-size: 10px; color: #888; }
.card-menu-wrap { position: relative; flex-shrink: 0; }
.card-menu-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }
.card-menu-btn:hover { color: #555; }
.card-menu { position: absolute; right: 0; top: 100%; z-index: 300; background: #fff; border: 0.5px solid #ccc; border-radius: 8px; padding: 4px 0; min-width: 155px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.card-menu-item { padding: 6px 12px; font-size: 12px; cursor: pointer; color: #111; white-space: nowrap; }
.card-menu-item:hover { background: #f5f5f5; }
.card-menu-item.green { color: #0F6E56; }
.card-menu-item.green:hover { background: #E1F5EE; }
.card-menu-item.red { color: #A32D2D; }
.card-menu-item.red:hover { background: #FCEBEB; }
.card-menu-divider { border-top: 0.5px solid #eee; margin: 4px 0; }

/* Date badge */
.date-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; cursor: pointer; border: 0.5px solid; white-space: nowrap; user-select: none; }
.date-badge.none { background: transparent; border-color: #B4B2A9; color: #888780; }
.date-badge.set { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; }
.date-badge.soon { background: #FAEEDA; border-color: #FAC775; color: #633806; }
.date-badge.overdue { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
.date-popover { position: absolute; z-index: 200; top: calc(100% + 4px); left: 0; background: #fff; border: 0.5px solid #ccc; border-radius: 10px; padding: 10px; min-width: 190px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.date-popover input { width: 100%; font-size: 12px; margin-bottom: 8px; border-radius: 6px; border: 0.5px solid #ccc; padding: 4px 6px; }
.date-popover-btns { display: flex; gap: 6px; }
.date-popover-btns button { flex: 1; font-size: 11px; padding: 4px 0; border-radius: 6px; cursor: pointer; }
.date-save-btn { border: 0.5px solid #85B7EB; background: #E6F1FB; color: #0C447C; }
.date-clear-btn { border: 0.5px solid #F09595; background: transparent; color: #A32D2D; }

/* Add item */
.add-btn-row { width: 100%; background: none; border: 0.5px dashed #ddd; border-radius: 8px; padding: 6px 0; font-size: 12px; color: #aaa; cursor: pointer; margin-top: 2px; }
.add-btn-row:hover { border-color: #aaa; color: #555; }
.add-form { background: #fff; border: 0.5px solid #ccc; border-radius: 8px; padding: 8px; margin-top: 4px; }
.add-form input, .add-form select { font-size: 12px; border: 0.5px solid #ddd; border-radius: 6px; padding: 5px 8px; width: 100%; margin-bottom: 6px; font-family: inherit; outline: none; }
.add-form input:focus, .add-form select:focus { border-color: #85B7EB; }
.add-form-row { display: flex; gap: 6px; margin-bottom: 6px; }
.add-form-row select, .add-form-row input { margin-bottom: 0; flex: 1; }
.add-form-actions { display: flex; gap: 6px; }
.add-form-actions button { flex: 1; font-size: 11px; padding: 5px 0; border-radius: 6px; cursor: pointer; font-family: inherit; }
.add-submit { border: 0.5px solid #85B7EB; background: #E6F1FB; color: #0C447C; }
.add-cancel { border: 0.5px solid #ddd; background: none; color: #888; }

/* Completed log */
.done-log { background: #f8f8f8; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
.done-log-header { font-size: 13px; font-weight: 500; color: #111; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 0.5px solid #eee; display: flex; align-items: center; gap: 8px; }
.done-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-bottom: 0.5px solid #eee; }
.done-row:last-child { border-bottom: none; }
.done-check { color: #5DCAA5; font-size: 13px; flex-shrink: 0; }
.done-text { flex: 1; min-width: 0; font-size: 12px; color: #666; text-decoration: line-through; }
.done-area { font-size: 10px; color: #aaa; margin-left: 6px; }
.done-date { font-size: 10px; color: #aaa; white-space: nowrap; flex-shrink: 0; }
.done-restore { background: none; border: 0.5px solid #ddd; border-radius: 6px; font-size: 10px; padding: 2px 7px; cursor: pointer; color: #888; flex-shrink: 0; }
.done-restore:hover { border-color: #888; color: #444; }
</style>
</head>
<body>
<div class="app" id="app">
  <div style="padding:40px;text-align:center;color:#aaa;font-size:13px;">Loading…</div>
</div>

<script>
const SHEET_ID = '1AvsNbN7TmxlOqbuHxUIPM1c8ONSzdGxmKRFO_uGZNKg';
const STORAGE_KEY = 'sage-triage-v2';
const TIERS = [
  { id:'t1', label:'On the clock',       sub:'Deadlines & consequences', color:'#A32D2D', bg:'#FCEBEB', border:'#F09595' },
  { id:'t2', label:'Active backlog',     sub:'No fire, real value',      color:'#633806', bg:'#FAEEDA', border:'#FAC775' },
  { id:'t3', label:'Important + patient',sub:'Goals live here',          color:'#0C447C', bg:'#E6F1FB', border:'#85B7EB' },
  { id:'gy', label:'Graveyard',          sub:'Honored but released',     color:'#444441', bg:'#F1EFE8', border:'#B4B2A9' },
];
const BUCKET_COLORS = {
  Admin:'#4A6FA5', House:'#7B5EA7', Family:'#C0392B',
  Bufala:'#2E86AB', 'Regen Ag':'#3D6B4F', Personal:'#D4882A', Building:'#555555'
};
const AREAS = ['Admin','Family','House','Bufala','Building','Regen Ag','Personal'];
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

let items = [];
let dragId = null;
let dragOverTier = null;
let dragOverId = null; // for within-column ordering
let openMenuId = null;
let openDateId = null;
let showDone = false;

// ── Storage ──────────────────────────────────────────────────
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch {}
}
function loadLocal() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) return JSON.parse(d); } catch {}
  return null;
}

// ── Date utils ───────────────────────────────────────────────
function parseDate(s) {
  if (!s) return null;
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}
function fmtDate(s) {
  const d = parseDate(s);
  if (!d) return null;
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function dateStatus(s) {
  const d = parseDate(s);
  if (!d) return 'none';
  const diff = (d - TODAY) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff <= 7) return 'soon';
  return 'set';
}
function fmtCompletedDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function nextId() { return Math.max(0, ...items.map(i => i.id)) + 1; }

// ── Bucket tag ───────────────────────────────────────────────
function bucketTag(area) {
  const c = BUCKET_COLORS[area] || '#888';
  return `<span style="font-size:10px;color:${c};font-weight:500;">${area}</span>`;
}

// ── Date badge ───────────────────────────────────────────────
function dateBadgeHtml(item) {
  if (item.tier === 'gy') return '';
  const st = dateStatus(item.date);
  const label = fmtDate(item.date) || '+ date';
  return `<span class="date-badge ${st}" onclick="toggleDate(event,${item.id})">${label}</span>`;
}

// ── Card ─────────────────────────────────────────────────────
function cardHtml(item) {
  const isDragging = dragId === item.id;
  const isGy = item.tier === 'gy';
  const otherTiers = TIERS.filter(t => t.id !== item.tier);
  const moveItems = otherTiers.map(t =>
    `<div class="card-menu-item" onclick="moveItem(${item.id},'${t.id}')">&rarr; ${t.label}</div>`
  ).join('');
  return `
  <div class="card${isDragging?' dragging':''}${isGy?' graveyard':''}"
    id="card-${item.id}"
    draggable="true"
    ondragstart="onDragStart(event,${item.id})"
    ondragend="onDragEnd()"
    ondragover="onCardDragOver(event,${item.id})"
  >
    <div class="card-body">
      <div class="card-check" onclick="completeItem(${item.id})"></div>
      <div class="card-content">
        <div class="card-text">${item.text}</div>
        <div class="card-meta">
          ${bucketTag(item.area)}
          <div style="position:relative;display:inline-block">
            ${dateBadgeHtml(item)}
            <div class="date-popover" id="datepop-${item.id}" style="display:none">
              <input type="date" id="dateinput-${item.id}" value="${item.date||''}" />
              <div class="date-popover-btns">
                <button class="date-save-btn" onclick="saveDate(${item.id})">Save</button>
                <button class="date-clear-btn" onclick="clearDate(${item.id})">Clear</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-menu-wrap">
        <button class="card-menu-btn" onclick="toggleMenu(event,${item.id})">···</button>
        <div class="card-menu" id="menu-${item.id}" style="display:none">
          <div class="card-menu-item green" onclick="completeItem(${item.id})">✓ Mark complete</div>
          <div class="card-menu-divider"></div>
          ${moveItems}
          <div class="card-menu-divider"></div>
          <div class="card-menu-item red" onclick="deleteItem(${item.id})">Delete</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── Add form ─────────────────────────────────────────────────
function addFormHtml(tierId) {
  const areaOpts = AREAS.map(a => `<option>${a}</option>`).join('');
  return `
  <div class="add-form" id="addform-${tierId}">
    <input id="addtext-${tierId}" placeholder="What needs doing…" onkeydown="addFormKey(event,'${tierId}')" />
    <div class="add-form-row">
      <select id="addarea-${tierId}">${areaOpts}</select>
      ${tierId !== 'gy' ? `<input type="date" id="adddate-${tierId}" />` : ''}
    </div>
    <div class="add-form-actions">
      <button class="add-submit" onclick="submitAdd('${tierId}')">Add</button>
      <button class="add-cancel" onclick="closeAddForm('${tierId}')">Cancel</button>
    </div>
  </div>`;
}

// ── Column ───────────────────────────────────────────────────
function columnHtml(tier) {
  const mine = items.filter(i => i.tier === tier.id && !i.done);
  if (tier.id === 't1') {
    mine.sort((a,b) => {
      if (a.date && b.date) return new Date(a.date) - new Date(b.date);
      if (a.date) return -1; if (b.date) return 1; return 0;
    });
  }
  const isOver = dragOverTier === tier.id;
  const cards = mine.map(cardHtml).join('');
  return `
  <div class="column${isOver?' drag-over':''}" id="col-${tier.id}"
    ondragover="onColDragOver(event,'${tier.id}')"
    ondrop="onDrop('${tier.id}')">
    <div class="col-header">
      <div class="col-title">
        <div class="col-title-main">${tier.label}</div>
        <div class="col-title-sub">${tier.sub}</div>
      </div>
      <span class="col-count" style="background:${tier.bg};color:${tier.color};border-color:${tier.border}">${mine.length}</span>
    </div>
    ${cards}
    <button class="add-btn-row" id="addbtn-${tier.id}" onclick="openAddForm('${tier.id}')">+ add item</button>
    <div id="addform-wrap-${tier.id}"></div>
  </div>`;
}

// ── Done log ─────────────────────────────────────────────────
function doneLogHtml() {
  const done = items.filter(i => i.done).sort((a,b) => new Date(b.completedAt||0) - new Date(a.completedAt||0));
  if (!showDone || !done.length) return '';
  const rows = done.map(item => `
    <div class="done-row">
      <span class="done-check">✓</span>
      <div class="done-text">${item.text}<span class="done-area">${item.area}</span></div>
      <span class="done-date">${fmtCompletedDate(item.completedAt)}</span>
      <button class="done-restore" onclick="restoreItem(${item.id})">restore</button>
    </div>`).join('');
  return `
  <div class="done-log">
    <div class="done-log-header">
      Completed
      <span class="badge badge-done active">${done.length}</span>
    </div>
    ${rows}
  </div>`;
}

// ── Header ───────────────────────────────────────────────────
function headerHtml() {
  const overdue = items.filter(i => !i.done && i.tier !== 'gy' && dateStatus(i.date) === 'overdue');
  const soon = items.filter(i => !i.done && i.tier !== 'gy' && dateStatus(i.date) === 'soon');
  const done = items.filter(i => i.done);
  return `
  <div class="header">
    <div>
      <div class="header-title">Kyle's board</div>
      <div class="header-sub" id="save-status">All changes saved</div>
    </div>
    <div class="header-badges">
      ${overdue.length ? `<span class="badge badge-overdue">${overdue.length} overdue</span>` : ''}
      ${soon.length ? `<span class="badge badge-soon">${soon.length} due soon</span>` : ''}
      ${done.length ? `<span class="badge badge-done${showDone?' active':''}" onclick="toggleDone()">${showDone?'hide':'show'} ${done.length} completed</span>` : ''}
    </div>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const cols = TIERS.map(columnHtml).join('');
  document.getElementById('app').innerHTML = `
    ${headerHtml()}
    ${doneLogHtml()}
    <div class="board">${cols}</div>
  `;
}

// ── Actions ──────────────────────────────────────────────────
function completeItem(id) {
  items = items.map(i => i.id === id ? {...i, done:true, completedAt:new Date().toISOString()} : i);
  closeAll(); saveLocal(); render();
}
function restoreItem(id) {
  items = items.map(i => i.id === id ? {...i, done:false, completedAt:null} : i);
  saveLocal(); render();
}
function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  closeAll(); saveLocal(); render();
}
function moveItem(id, tierId) {
  items = items.map(i => i.id === id ? {...i, tier:tierId} : i);
  closeAll(); saveLocal(); render();
}
function toggleDone() {
  showDone = !showDone; render();
}

// ── Date popover ─────────────────────────────────────────────
function toggleDate(e, id) {
  e.stopPropagation();
  const pop = document.getElementById('datepop-' + id);
  if (!pop) return;
  const wasOpen = openDateId === id;
  closeAll();
  if (!wasOpen) { pop.style.display = 'block'; openDateId = id; }
}
function saveDate(id) {
  const val = document.getElementById('dateinput-' + id)?.value || null;
  items = items.map(i => i.id === id ? {...i, date: val||null} : i);
  closeAll(); saveLocal(); render();
}
function clearDate(id) {
  items = items.map(i => i.id === id ? {...i, date:null} : i);
  closeAll(); saveLocal(); render();
}

// ── Menu ─────────────────────────────────────────────────────
function toggleMenu(e, id) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  if (!menu) return;
  const wasOpen = openMenuId === id;
  closeAll();
  if (!wasOpen) { menu.style.display = 'block'; openMenuId = id; }
}
function closeAll() {
  if (openMenuId) { const m = document.getElementById('menu-' + openMenuId); if (m) m.style.display = 'none'; openMenuId = null; }
  if (openDateId) { const d = document.getElementById('datepop-' + openDateId); if (d) d.style.display = 'none'; openDateId = null; }
}
document.addEventListener('click', closeAll);

// ── Add form ─────────────────────────────────────────────────
function openAddForm(tierId) {
  const wrap = document.getElementById('addform-wrap-' + tierId);
  const btn = document.getElementById('addbtn-' + tierId);
  if (!wrap) return;
  wrap.innerHTML = addFormHtml(tierId);
  btn.style.display = 'none';
  const inp = document.getElementById('addtext-' + tierId);
  if (inp) inp.focus();
}
function closeAddForm(tierId) {
  const wrap = document.getElementById('addform-wrap-' + tierId);
  const btn = document.getElementById('addbtn-' + tierId);
  if (wrap) wrap.innerHTML = '';
  if (btn) btn.style.display = '';
}
function addFormKey(e, tierId) {
  if (e.key === 'Enter') submitAdd(tierId);
  if (e.key === 'Escape') closeAddForm(tierId);
}
function submitAdd(tierId) {
  const text = document.getElementById('addtext-' + tierId)?.value.trim();
  if (!text) return;
  const area = document.getElementById('addarea-' + tierId)?.value || 'Admin';
  const date = document.getElementById('adddate-' + tierId)?.value || null;
  items.push({ id: nextId(), text, area, tier: tierId, date, done: false });
  saveLocal(); render();
}

// ── Drag & Drop ──────────────────────────────────────────────
function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => render(), 0);
}
function onDragEnd() {
  dragId = null; dragOverTier = null; dragOverId = null;
  render();
}
function onColDragOver(e, tierId) {
  e.preventDefault();
  if (dragOverTier !== tierId) { dragOverTier = tierId; render(); }
}
function onCardDragOver(e, cardId) {
  e.preventDefault(); e.stopPropagation();
  if (dragOverId !== cardId) { dragOverId = cardId; }
}
function onDrop(tierId) {
  if (dragId == null) return;
  const dragged = items.find(i => i.id === dragId);
  if (!dragged) return;

  // If dropping onto a specific card, reorder within/across
  if (dragOverId && dragOverId !== dragId) {
    const target = items.find(i => i.id === dragOverId);
    if (target) {
      // Move dragged item to target's tier and position
      const newItems = items.filter(i => i.id !== dragId);
      const targetIdx = newItems.findIndex(i => i.id === dragOverId);
      const updated = {...dragged, tier: target.tier};
      newItems.splice(targetIdx, 0, updated);
      items = newItems;
    }
  } else {
    // Just move to column
    items = items.map(i => i.id === dragId ? {...i, tier: tierId} : i);
  }

  dragId = null; dragOverTier = null; dragOverId = null;
  saveLocal(); render();
}

// ── Init from Sheet ──────────────────────────────────────────
function mapSheetToItems(rows) {
  // headers: ID,Title,Bucket,Type,Status,Priority,Due Date,Notes
  return rows.slice(1).filter(r => r[0]).map((r, idx) => {
    const status = (r[4]||'').toLowerCase();
    const done = status === 'done' || status === 'completed';
    // Map to tier based on Priority and Type
    let tier = 't2';
    const priority = (r[5]||'').toLowerCase();
    const type = (r[3]||'').toLowerCase();
    if (priority === 'priority') tier = 't1';
    else if (type === 'project') tier = 't3';
    return {
      id: parseInt(r[0]) || (idx + 1),
      text: r[1] || '',
      area: r[2] || 'Admin',
      tier,
      date: r[6] || null,
      done,
      completedAt: done ? new Date().toISOString() : null,
      notes: r[7] || ''
    };
  }).filter(i => i.text);
}

async function loadFromSheet() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
    const res = await fetch(url);
    const csv = await res.text();
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
    const sheetItems = mapSheetToItems(rows);
    if (sheetItems.length > 0) {
      items = sheetItems;
      saveLocal();
    }
  } catch(e) {
    console.warn('Sheet load failed, using local data');
  }
}

async function init() {
  // Try local first for instant load
  const local = loadLocal();
  if (local && local.length) { items = local; render(); }
  // Then sync from sheet
  await loadFromSheet();
  render();
}

init();
</script>
</body>
</html>
